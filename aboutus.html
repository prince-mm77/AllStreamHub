<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modern Base Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #05040d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Glassmorphic Background Orbs */
        .liquid-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            mix-blend-mode: screen;
            animation: morphing 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            top: -10%;
            left: -5%;
        }

        .orb-2 {
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -10%;
            right: -5%;
            animation-delay: -7s;
        }

        /* Premium Glass Card */
        .glass-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 3.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #ffffff 30%, #0096ff 70%, #ff007f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Profile Avatar Styling */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 2rem auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
        }

        /* Info Grid Layout */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.25rem;
            border-radius: 14px;
            text-align: left;
        }

        .info-box span {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-box p {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Social / Contact Row */
        .contact-row {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-link {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.25rem;
            border-radius: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            border-color: rgba(0, 150, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .icon-wrapper {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 1rem;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .contact-link:hover .icon-wrapper.gmail { color: #ea4335; background: rgba(234, 67, 53, 0.1); }
        .contact-link:hover .icon-wrapper.insta { color: #e1306c; background: rgba(225, 48, 108, 0.1); }
        .contact-link:hover .icon-wrapper.phone { color: #0096ff; background: rgba(0, 150, 255, 0.1); }

        .link-text {
            text-align: left;
        }

        .link-text span {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .link-text p {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Background Animation */
        @keyframes morphing {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
            100% { transform: translate(-15px, 15px) scale(0.98); }
        }

        @media (max-width: 500px) {
            .glass-panel { padding: 2.5rem 1.5rem; }
            h1 { font-size: 2rem; }
            .info-grid { grid-template-columns: 1fr; gap: 1rem; }
        }
    </style>
</head>
