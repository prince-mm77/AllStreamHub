        /* Premium Glass Card */
        .glass-panel {
            position: relative;
            z-index: 10;
            width: 100%;

            padding: 3.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, #ffffff 30%, #0096ff 70%, #ff007f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Contact Items Layout */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            border-color: rgba(0, 150, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        /* Icon Container */
        .icon-box {
            width: 48px;

            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;

            justify-content: center;

            transition: all 0.3s ease;
        }

        /* Specific Icon Styling */
        .info-item:hover .icon-box.gmail { color: #ea4335; background: rgba(234, 67, 53, 0.1); }
        .info-item:hover .icon-box.insta { color: #e1306c; background: rgba(225, 48, 108, 0.1); }
        .info-item:hover .icon-box.phone { color: #0096ff; background: rgba(0, 150, 255, 0.1); }

        /* Text Details */
        .text-box {

            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .text-box p {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Background Animation */
        @keyframes morphing {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
            100% { transform: translate(-15px, 15px) scale(0.98); }
        }

        @media (max-width: 480px) {
            .glass-panel { padding: 2.5rem 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
